# golangci-lint configuration (v2) for the hyperhandler Go port (SPEC-007).
version: "2"

linters:
  # The default set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  settings:
    staticcheck:
      checks:
        - all
        # ST1005: error strings are capitalized on purpose — several are
        # user-facing CLI messages kept byte-for-byte in parity with the
        # Python implementation (e.g. "Signal validation failed: ...").
        - -ST1005
  exclusions:
    # Built-in exclusions for idiomatic unchecked errors: deferred Close,
    # Fprint* to stdout/stderr, etc.
    presets:
      - std-error-handling
    rules:
      # Test helpers freely ignore Write/Encode/Decode on in-memory fakes.
      - path: _test\.go
        linters:
          - errcheck
